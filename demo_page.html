<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGM State Observer — Demo Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #94a3b8; }

    /* Spinner */
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      margin: 1.5rem 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .status-text {
      font-size: 0.9rem;
      color: #64748b;
      margin-top: 0.5rem;
    }

    /* Loaded state */
    #target-element {
      display: none;
      animation: fadeIn 0.5s ease-in;
    }
    #target-element.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .success-text {
      font-size: 1.25rem;
      color: #22c55e;
      font-weight: 600;
    }
    .success-sub {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading state -->
    <div id="loading-state">
      <h1>Simulated Slow-Loading Page</h1>
      <div class="spinner"></div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p class="status-text" id="status-text">Initializing...</p>
    </div>

    <!-- Target element revealed after loading -->
    <div id="target-element">
      <div class="success-icon">&#10003;</div>
      <p class="success-text">Page Loaded Successfully</p>
      <p class="success-sub">The target element is now present in the DOM.</p>
    </div>
  </div>

  <script>
    // Randomized load time between 3 and 8 seconds
    const LOAD_TIME_MS = 3000 + Math.floor(Math.random() * 5000);
    const startTime = performance.now();

    const progressFill = document.getElementById('progress-fill');
    const statusText   = document.getElementById('status-text');
    const loadingState = document.getElementById('loading-state');
    const targetEl     = document.getElementById('target-element');

    const messages = [
      'Initializing...',
      'Fetching resources...',
      'Parsing response...',
      'Rendering components...',
      'Almost there...',
    ];

    // Update progress bar and status text
    const progressInterval = setInterval(() => {
      const elapsed = performance.now() - startTime;
      const pct = Math.min((elapsed / LOAD_TIME_MS) * 100, 99);
      progressFill.style.width = pct + '%';

      const msgIdx = Math.min(
        Math.floor((elapsed / LOAD_TIME_MS) * messages.length),
        messages.length - 1
      );
      statusText.textContent = messages[msgIdx];
    }, 100);

    // Simulate network activity: a simple XHR ping endpoint (self-referential)
    // This provides the observer with measurable network latency.
    window.__latencyMs = 0;
    async function pingLoop() {
      while (true) {
        const t0 = performance.now();
        try {
          // Fetch own page as a lightweight ping; abort after 3s
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 3000);
          await fetch(window.location.href, {
            method: 'HEAD',
            cache: 'no-store',
            signal: ctrl.signal,
          });
          clearTimeout(timer);
          window.__latencyMs = performance.now() - t0;
        } catch {
          window.__latencyMs = 5000; // treat abort / error as timeout
        }
        await new Promise(r => setTimeout(r, 150));
      }
    }
    pingLoop();

    // Reveal target element after the randomized delay
    setTimeout(() => {
      clearInterval(progressInterval);
      progressFill.style.width = '100%';
      statusText.textContent = 'Complete!';

      setTimeout(() => {
        loadingState.style.display = 'none';
        targetEl.classList.add('visible');
      }, 400);
    }, LOAD_TIME_MS);
  </script>
</body>
</html>
